map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Railway's internal DNS resolver (confirmed via /etc/resolv.conf
        # inside a Railway container) is an IPv6 address, not Docker
        # Compose's 127.0.0.11. Re-resolve every 10s so IP changes on
        # backend redeploy are picked up without restarting nginx.
        resolver [fd12::10] valid=10s;
        set $backend_upstream custody-saas.railway.internal:8080;
        proxy_pass http://$backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 10s;

        # Force a fresh TCP connection (and fresh DNS lookup) on every
        # request instead of reusing a pooled keepalive connection.
        # Railway reassigns this backend's internal IP on every redeploy,
        # and a kept-alive connection to the OLD IP otherwise lingers
        # until it errors out as a 502 — this setting prevents that.
        proxy_set_header Connection "close";
    }

    # Registered face photos and fingerprint scans, served by the
    # backend's express.static mount. Declared as ^~ (a prefix match
    # that takes priority over regex locations) so it isn't shadowed
    # by the cached-static-asset rule below, which would otherwise
    # match /uploads/*.jpg on file extension and try to serve it as a
    # local file instead of proxying it to the backend.
    location ^~ /uploads/ {
        resolver [fd12::10] valid=10s;
        set $backend_upstream custody-saas.railway.internal:8080;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_set_header Connection "close";
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
